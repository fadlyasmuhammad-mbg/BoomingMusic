name: Build APK

on:
  workflow_dispatch:
    inputs:
      build_note:
        description: "Build notes"
        required: false
        default: "Manual build"
        type: string

permissions:
  contents: read

concurrency:
  group: release-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build ARM64 Release APK
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Build ARM64 release APK
        run: ./gradlew :app:assembleNormalRelease --stacktrace --no-daemon

      - name: Locate and rename ARM64 release APK
        shell: bash
        run: |
          APK_DIRECTORY="app/build/outputs/apk/normal/release"
          APK_SOURCE="$(
            find "${APK_DIRECTORY}" \
              -maxdepth 1 \
              -type f \
              -name '*-arm64-v8a.apk' \
              -print \
              -quit
          )"

          if [ -z "${APK_SOURCE}" ]; then
            echo "ARM64-v8a normal release APK was not found."
            echo "Available APK files:"

            find app/build/outputs/apk \
              -type f \
              -name '*.apk' \
              -print 2>/dev/null || true

            exit 1
          fi

          SHORT_SHA="${GITHUB_SHA::7}"
          APK_NAME="FadenceMusic-${GITHUB_RUN_NUMBER}-${SHORT_SHA}-normal-arm64-v8a-release.apk"
          APK_FILE="output/${APK_NAME}"

          mkdir -p output
          cp "${APK_SOURCE}" "${APK_FILE}"

          APK_SIZE="$(du -h "${APK_FILE}" | cut -f1)"
          APK_SHA256="$(sha256sum "${APK_FILE}" | awk '{print $1}')"

          echo "APK_NAME=${APK_NAME}" >> "${GITHUB_ENV}"
          echo "APK_FILE=${APK_FILE}" >> "${GITHUB_ENV}"
          echo "APK_SIZE=${APK_SIZE}" >> "${GITHUB_ENV}"
          echo "APK_SHA256=${APK_SHA256}" >> "${GITHUB_ENV}"

          echo "Source APK: ${APK_SOURCE}"
          echo "Output APK: ${APK_FILE}"
          echo "APK size: ${APK_SIZE}"
          echo "SHA-256: ${APK_SHA256}"

      - name: Upload APK to GitHub Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: FadenceMusic-release-${{ github.run_number }}
          path: ${{ env.APK_FILE }}
          if-no-files-found: error
          retention-days: 14
          compression-level: 0

      - name: Send APK to Telegram
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          BUILD_NOTE: ${{ inputs.build_note }}
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${TG_BOT_TOKEN:-}" ]; then
            echo "TG_BOT_TOKEN secret is not configured."
            exit 1
          fi

          if [ -z "${TG_CHAT_ID:-}" ]; then
            echo "TG_CHAT_ID secret is not configured."
            exit 1
          fi

          BUILD_NOTE="${BUILD_NOTE:-Manual release build}"
          BUILD_NOTE="${BUILD_NOTE:0:300}"

          SHORT_SHA="${GITHUB_SHA::7}"
          RUN_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"

          CAPTION="$(cat <<EOF
          ✅ APK build completed successfully

          📦 File: ${APK_NAME}
          📏 Size: ${APK_SIZE}
          🌿 Branch: ${GITHUB_REF_NAME}
          🔖 Commit: ${SHORT_SHA}
          🔢 Build number: #${GITHUB_RUN_NUMBER}
          📝 Notes: ${BUILD_NOTE}

          🔗 Build logs:
          ${RUN_URL}

          🔐 SHA-256:
          ${APK_SHA256}
          EOF
          )"

          curl \
            --fail-with-body \
            --silent \
            --show-error \
            --retry 3 \
            --retry-delay 5 \
            --retry-all-errors \
            --request POST \
            "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendDocument" \
            --form-string "chat_id=${TG_CHAT_ID}" \
            --form "document=@${APK_FILE}" \
            --form-string "caption=${CAPTION}"

          echo
          echo "APK was successfully sent to Telegram."

      - name: Send failure notification to Telegram
        if: failure()
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        shell: bash
        run: |
          if [ -z "${TG_BOT_TOKEN:-}" ] || [ -z "${TG_CHAT_ID:-}" ]; then
            echo "Telegram secrets are not configured. Skipping failure notification."
            exit 0
          fi

          SHORT_SHA="${GITHUB_SHA::7}"
          RUN_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"

          MESSAGE="$(cat <<EOF
          ❌ APK build failed

          📁 Repository: ${GITHUB_REPOSITORY}
          🌿 Branch: ${GITHUB_REF_NAME}
          🔖 Commit: ${SHORT_SHA}
          🔢 Build number: #${GITHUB_RUN_NUMBER}

          Check the GitHub Actions logs:
          ${RUN_URL}
          EOF
          )"

          curl \
            --fail-with-body \
            --silent \
            --show-error \
            --retry 2 \
            --retry-delay 3 \
            --request POST \
            "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TG_CHAT_ID}" \
            --data-urlencode "text=${MESSAGE}" || true
